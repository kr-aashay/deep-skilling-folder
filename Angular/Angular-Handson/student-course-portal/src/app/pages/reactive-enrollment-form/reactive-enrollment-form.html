<div class="form-container">
  <h2>Reactive Enrollment Form</h2>

  <form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">

    <!-- Student Name -->
    <div class="form-group">
      <label>Student Name</label>
      <input type="text" formControlName="studentName" class="form-control" />
      <div *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors" class="error-messages">
        <span *ngIf="enrollForm.get('studentName')?.errors?.['required']">Name is required</span>
        <span *ngIf="enrollForm.get('studentName')?.errors?.['minlength']">Name must be at least 3 characters</span>
      </div>
    </div>

    <!-- Student Email with async validator -->
    <div class="form-group">
      <label>Student Email</label>
      <input type="email" formControlName="studentEmail" class="form-control" />
      <div *ngIf="enrollForm.get('studentEmail')?.pending" class="pending-msg">Checking email...</div>
      <div *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors" class="error-messages">
        <span *ngIf="enrollForm.get('studentEmail')?.errors?.['required']">Email is required</span>
        <span *ngIf="enrollForm.get('studentEmail')?.errors?.['email']">Invalid email format</span>
        <span *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">This email is already taken</span>
      </div>
    </div>

    <!-- Course ID with custom validator -->
    <div class="form-group">
      <label>Course ID</label>
      <input type="text" formControlName="courseId" class="form-control" />
      <div *ngIf="enrollForm.get('courseId')?.touched && enrollForm.get('courseId')?.errors" class="error-messages">
        <span *ngIf="enrollForm.get('courseId')?.errors?.['required']">Course ID is required</span>
        <span *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">Course code starting with XX is not allowed.</span>
      </div>
    </div>

    <!-- Preferred Semester -->
    <div class="form-group">
      <label>Preferred Semester</label>
      <select formControlName="preferredSemester" class="form-control">
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>

    <!-- Agree to Terms -->
    <div class="form-group checkbox-group">
      <input type="checkbox" formControlName="agreeToTerms" />
      <label>I agree to the terms and conditions</label>
      <div *ngIf="enrollForm.get('agreeToTerms')?.touched && enrollForm.get('agreeToTerms')?.errors" class="error-messages">
        <span>You must agree to the terms</span>
      </div>
    </div>

    <!-- FormArray: additional courses -->
    <div formArrayName="additionalCourses">
      <h4>Additional Courses</h4>
      <div *ngFor="let ctrl of additionalCourses.controls; let i = index" class="array-item">
        <input type="text" [formControlName]="i" class="form-control" placeholder="Course code" />
        <button type="button" (click)="removeCourse(i)" class="btn-remove">Remove</button>
      </div>
      <button type="button" (click)="addCourse()" class="btn-secondary">+ Add Another Course</button>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="enrollForm.invalid" class="btn-primary">Submit</button>
    </div>

  </form>
</div>
