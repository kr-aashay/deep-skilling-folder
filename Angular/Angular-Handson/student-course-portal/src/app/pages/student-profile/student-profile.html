<div class="profile-container">
  <h2>Student Profile</h2>

  <div class="profile-card">
    <h3>John Doe</h3>
    <p>Email: john.doe@university.edu</p>
    <p>Student ID: STU-2024-001</p>
    <p>GPA: 3.8</p>
  </div>

  <h3>Enrolled Courses</h3>

  <div *ngIf="enrolledCourses.length > 0; else noEnrollments" class="enrolled-list">
    <div *ngFor="let course of enrolledCourses" class="enrolled-item">
      <span class="course-name">{{ course.name }}</span>
      <span class="course-code">{{ course.code }}</span>
      <span class="course-credits">{{ course.credits | creditLabel }}</span>
    </div>
  </div>

  <ng-template #noEnrollments>
    <p class="no-data">You are not enrolled in any courses yet.</p>
  </ng-template>
</div>
